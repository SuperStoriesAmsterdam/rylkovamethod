server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # Clean URLs: /route-a resolves to route-a.html
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # Compress text assets
    gzip              on;
    gzip_vary         on;
    gzip_min_length   256;
    gzip_types        text/plain text/css application/javascript application/json image/svg+xml;

    # Long cache for fingerprintable static assets
    location ~* \.(?:css|js|woff2|jpe?g|png|webp|gif|svg|ico)$ {
        expires    7d;
        add_header Cache-Control "public";
    }

    # HTML is a review build that changes often — don't cache it
    location ~* \.html$ {
        add_header Cache-Control "no-cache";
    }

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options        "SAMEORIGIN" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
}
